# lightning.pytorch==2.1.0
seed_everything: true
trainer:
  accelerator: auto
  accumulate_grad_batches: 256
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      save_dir: results/wandb_logging
      version: null
      offline: false
      dir: null
      id: null
      anonymous: null
      project: JointEmbed_Training
      log_model: false
      experiment: null
      prefix: ''
      checkpoint_name: null
      job_type: null
      config: null
      entity: single-cellm
      reinit: null
      tags: null
      group: null
      notes: null
      magic: null
      config_exclude_keys: null
      config_include_keys: null
      allow_val_change: null
      resume: null
      force: null
      tensorboard: null
      sync_tensorboard: null
      monitor_gym: null
      save_code: null
      settings: null
  callbacks: null
  fast_dev_run: false
  max_epochs: 50
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: "02:40:00:00"
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: true
  enable_model_summary: null
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: results/model_training
model:
  model_config:
    transcriptome_config: {}
    text_config: {}
    unlocked_fp16: false
    text_model_type: bert
    transcriptome_model_type: scgpt
    projection_dim: 1024
    locking_mode: UU
  loss_config:
    clip_lite_type: dot
    clip_lite_prior_weight: 0.1
    clip_lite_transcriptome_prior: false
    clip_lite_text_prior: false
    clip_lambda: 1.0
    clip_lite_lambda: 10.0
  val_batch_size: 32
  gauss_noise_std: 0.0
  optimizer: torch.optim.AdamW
  scheduler:
    class_path: torch.optim.lr_scheduler.CosineAnnealingLR
    init_args:
      T_max: 50
      eta_min: 0.0
      last_epoch: -1
      verbose: false
  learning_rate: 0.00001
  lr_warmup_steps: 100
data:
  dataset_name: archs4_metasra
  nproc: 8
  transcriptome_processor_kwargs: {}
  min_genes: 200
best_model_path: null
log_level: INFO
dap_debug: false
wandb: 'scgpt_clip_lite_UU'
ckpt_path: null
batch_size: 128
