method: random
name: multi-dataset-training
metric:
  goal: minimize
  name: val_loss
parameters:
  config:
    values:
      - src/experiments/sweeps/351_multi_dataset_training/base_config.yaml
  model.model_config.locking_mode:
    values: ["LU", "UL", "UU"]
  model.learning_rate:
    distribution: log_uniform_values
    min: 1e-6
    max: 1e-2
