name: llava
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - cuda-nvcc=12.3
  - nbconvert=7.16.0
  - notebook=7.1.0
  - pyarrow=16.1.0
  - pip=24.0
  - transformers=4.37.2
  - numpy=1.26.4 
  - httpx=0.24.0 
  - httpcore=0.17.3 
  - pip:
    - -e ../modules/LLaVA/[train]
    - anndata==0.10.7
