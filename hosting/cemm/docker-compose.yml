  nginx:
    container_name: nginx
    image: nginx:latest
    volumes:
      - ./htpasswd:/etc/nginx/.htpasswd:ro,Z
      - nginx_conf:/etc/nginx/conf.d:z
      - ../static:/static:Z
      - ./nginx.conf:/etc/nginx/nginx.conf:Z
      - ./logging/dashboard/:/usr/share/nginx/dashboard/:ro,z
    ports:
      - "8000:8000"
    #command: tail -f /dev/null
    #restart: unless-stopped
    networks:
        - whisper
    depends_on:
        - cellwhisperer_clip
        - cellwhisperer_llava_model
        - cellwhisperer_llava_controller

  docker-gen:
    userns_mode: "keep-id"
    privileged: true # This container needs to be able to access the podman socket to get running containers.
    container_name: docker-gen-sidecar
    image: jwilder/docker-gen
    command: -notify-sighup nginx -watch /etc/docker-gen/templates/nginx.tmpl /etc/nginx/conf.d/default.conf
    restart: unless-stopped
    volumes:
      # Mount the rootless podman socket
      - ${XDG_RUNTIME_DIR}/podman/podman.sock:/var/run/docker.sock:ro,Z
      - ./nginx.tmpl:/etc/docker-gen/templates/nginx.tmpl:ro,Z
      - nginx_conf:/etc/nginx/conf.d:z
    networks:
      - whisper
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

networks:
    whisper:
            name: ${PODMAN_NETWORK_NAME:-cwhispernet}
            external: true

volumes:
    cache:
    nginx_conf:
