name: cellwhisperer_group
version: '3.8'

services:
  cellwhisperer_clip:
    container_name: cellwhisperer_clip
    build:
      context: ../..
    image: cellwhisperer
    runtime: nvidia
    working_dir: /opt/cellwhisperer
    volumes:
      - /nobackup/lab_bock/projects/cellwhisperer/results/models/jointemb/cellwhisperer_clip_v1.ckpt:/opt/cellwhisperer/results/models/jointemb/cellwhisperer_clip_v1.ckpt:ro
      - cache:/cache/:Z
      - /nobackup/lab_bock/projects/cellwhisperer/resources/:/opt/cellwhisperer/resources
    command: python src/model_server/main.py
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      MODEL: "/model.ckpt"
      CONDA_ENV: cellwhisperer
      TRANSFORMERS_CACHE: /cache/transformers
      HF_CACHE: /cache/transformers
      CELLWHISPERER_CACHE: /cache/cellwhisperer
    #  deploy:
    #  resources:
    #    reservations:
    #        devices:
    #        - capabilities: [gpu]
    #          driver: nvidia
    #          count: all
    devices:
        - "nvidia.com/gpu=all"
    networks:
        - whisper

  cellwhisperer_llava_controller:  &llava-service
    container_name: cellwhisperer_llava_controller
    stdin_open: true
    tty: true
    runtime: nvidia
    working_dir: /opt/cellwhisperer
    environment:
      CONDA_ENV: llava
    build:
      context: ../..
    image: cellwhisperer
    command: python -m llava.serve.controller --host 0.0.0.0 --port 10000
    networks:
        - whisper

  cellwhisperer_llava_model:
    <<: *llava-service
    command: python -m llava.serve.model_worker --multi-modal --host 0.0.0.0 --controller http://cellwhisperer_llava_controller:10000 --port 40000 --worker http://cellwhisperer_llava_model:40000 --model-path /Mistral-7B-Instruct-v0.2__cellwhisperer_clip_v1/
    container_name: cellwhisperer_llava_model
    devices:
        - "nvidia.com/gpu=all"
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - nvidia.com/gpu=all
    #        - capabilities: [gpu]
    #          count: all
    #          driver: nvidia
    volumes:
      - /nobackup/lab_bock/projects/cellwhisperer/results/llava/finetuned/Mistral-7B-Instruct-v0.2__cellwhisperer_clip_v1:/Mistral-7B-Instruct-v0.2__cellwhisperer_clip_v1:ro
      - cache:/cache/:Z
    environment:
      CONDA_ENV: llava
      HF_CACHE: /cache/transformers
    networks:
      - whisper

  cellxgene_tabsap: &cellxgene-service  # This YAML anchor is the base for all dynamic services
    container_name: cellxgene_tabsap
    build:
      context: ../..
    image: cellwhisperer
    working_dir: /opt/cellwhisperer
    volumes:
      - ./cellxgene_config.yaml:/cellxgene_config.yaml:ro,z
      - /nobackup/lab_bock/projects/cellwhisperer/results/tabula_sapiens/cellwhisperer_clip_v1/cellxgene.h5ad:/dataset.h5ad:ro
      - ./llava_logs/tabsap/:/logs/:Z
    command: gunicorn --worker-class gevent --bind 0.0.0.0:5005 server.app.wsgi:application --timeout 60
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment: &cellxgene-env
      CXG_CONFIG_FILE: /cellxgene_config.yaml
      LOGDIR: "/logs/"
      MODEL: "http://cellwhisperer_clip:8910/api"
      JEST_ENV: "prod"
      RETRY_ATTEMPTS: 2
      CONDA_ENV: cellwhisperer
      
      PROXY_LOCATION_PATH: "tabulasapiens"
      GENERATE_PROXY_LOCATION: "true"
      PROXY_PORT: "5005"
      PROXY_AUTH: "false"
    deploy:
      resources:
        limits:
          memory: 16G
    networks:
        - whisper
    depends_on:
      - cellwhisperer_clip
      - cellwhisperer_llava_model
      - cellwhisperer_llava_controller

  cellxgene_car_t:
    <<: *cellxgene-service
    container_name: cellxgene_car_t
    volumes:
      - ./cellxgene_config.yaml:/cellxgene_config.yaml:ro,z
      - /nobackup/lab_bock/projects/cellwhisperer/results/car_t/cellwhisperer_clip_v1/cellxgene.h5ad:/dataset.h5ad:ro
      - ./llava_logs/car_t/:/logs/:Z
    environment:
      <<: *cellxgene-env
      PROXY_LOCATION_PATH: "car_t"
