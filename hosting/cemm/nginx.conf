user  root;

events {
    worker_connections  256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # avoid "could not build variables hash" error.
    variables_hash_bucket_size 128;
    
    # Set up logging preserve IP before reverse proxy.
    log_format forwarded '$http_x_forwarded_for - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    # Load remaining configs (server blocks) autogenerated by docker-gen
    include /etc/nginx/conf.d/*.conf;

}
