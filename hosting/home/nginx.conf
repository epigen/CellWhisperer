
events {}

http {
    server {
        listen 80;
        root /static;

        # Serve 'index.html' for root URL, '/index', and '/index.html'
        location = / {
            try_files /index.html =404;
        }

        location = /index {
            try_files /index.html =404;
        }

        location = /index.html {
            try_files /index.html =404;
        }

        # This location block matches requests to '/tabulasapiens'.
        location /tabulasapiens/ {
            proxy_pass http://cellxgene_tabsap:5005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # This location block matches requests to '/geo'.
        location /geo/ {
            proxy_pass http://cellxgene_geo:5005/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

