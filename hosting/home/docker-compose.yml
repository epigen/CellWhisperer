version: '3.8'
services:
  cellwhisperer_api:
    build: .
    runtime: nvidia
    working_dir: /opt/cellwhisperer
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/models/jointemb/03jujd8s.ckpt:/model.ckpt
      - cache:/cache/
    command: /bin/bash /start.sh python src/model_server/main.py
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-c38cbc2d-129a-dddf-9ed4-8a0e06763d33
      MODEL: "/model.ckpt"
      CONDA_ENV: cellwhisperer
      TRANSFORMERS_CACHE: /cache/transformers
      CELLWHISPERER_CACHE: /cache/cellwhisperer
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia


  cellxgene_tabsap: &default-service
    build: .
    working_dir: /opt/cellwhisperer
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/tabula_sapiens/03jujd8s/cellxgene.h5ad:/dataset.h5ad
    # TODO add --debug here if more debug info is needed
    command: /bin/bash /start.sh cellxgene launch --debug -v -p 5005  --host 0.0.0.0 --max-category-items 500 --backed /dataset.h5ad  "http://cellwhisperer_api:8910/api"
    stdin_open: true
    tty: true
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: GPU-c38cbc2d-129a-dddf-9ed4-8a0e06763d33
      # CXG_CLIENT_PORT: 3000
      CXG_OPTIONS: "--host 0.0.0.0 --max-category-items 500 --backed"
      CXG_SERVER_PORT: 5005
      DATASET: "/dataset.h5ad"
      MODEL: "http://cellwhisperer_api:8910/api"
      JEST_ENV: "prod"
      RETRY_ATTEMPTS: 2
      CONDA_ENV: cellwhisperer
    deploy:
      resources:
        limits:
          memory: 16G

  cellxgene_daniel:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/daniel/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_development_scvi:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/development4s_scvi/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_development_raw:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/development4s_raw/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_geo:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/archs4_metasra/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_car_t:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/car_t/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_hcaorganoids_cancer__organoid:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/hcaorganoids_cancer__organoid/03jujd8s/cellxgene.h5ad:/dataset.h5ad
  cellxgene_hcaorganoids_cancer__primary:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/hcaorganoids_cancer__primary/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_hcaorganoids_normal__primary:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/hcaorganoids_normal__primary/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  cellxgene_hcaorganoids_normal__organoid:
    <<: *default-service
    volumes:
      - ./docker_conda:/opt/miniconda3
      - ./start.sh:/start.sh
      - ~/cellwhisperer:/opt/cellwhisperer
      - ~/cellwhisperer/results/hcaorganoids_normal__organoid/03jujd8s/cellxgene.h5ad:/dataset.h5ad

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static
    ports:
      - "80:80"
    depends_on:
      - cellxgene_tabsap
      - cellxgene_geo  # Add dependency if needed
      - cellxgene_development_raw
      - cellxgene_development_scvi
      - cellxgene_daniel
      # ...
    restart: unless-stopped


  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      # - "start"  # tried to start with config but did not work
      # - "--all"
      - "http"
      - "nginx:80"
      - "--basic-auth"
      - "review:iclr2024-mlgenx"
      - "--domain"
      - "upright-communal-panda.ngrok-free.app"
      - "--config"
      - "/etc/ngrok.yml" # ,/ngrok.yml"
    volumes:
      - ~/.config/ngrok/ngrok.yml:/etc/ngrok.yml
      # - ./ngrok.yml:/ngrok.yml
    ports:
      - 4040:4040

volumes:
  cache:
