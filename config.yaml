anndata_label_name: natural_language_annotation

paths:
  read_count_table: resources/{dataset}/read_count_table.h5ad
  raw_annotations: resources/{dataset}/annotations.tsv
  structured_annotations: results/{dataset}/annotations.json
  processed_annotations: results/{dataset}/processed_annotations.json
  full_dataset: results/{dataset}/full_data.h5ad
  llm_embeddings: results/{dataset}/llm_embeddings.npz
  rna_embeddings: results/{dataset}/rna_embeddings.npz
  enrichr_terms_json: resources/enrichr_terms/terms.json
  ensembl_gene_symbol_map: resources/ensembl_gene_symbol_map.csv
  jointemb_models: results/models/jointemb
  wandb_logs: results/wandb_logging
  datamodule_prepared_path: results/{dataset}/lightning-processed/{transcriptome_processor}__{tokenizer}.pt
  text_model_cache: results/cache/text.pkl
  transcriptome_model_cache: results/cache/transcriptome.pkl
  cancer_gene_essentiality:
    essential_genes: resources/cancer_gene_essentiality/CRISPRInferredCommonEssentials.csv
    nonessential_genes: resources/cancer_gene_essentiality/AchillesNonessentialControls.csv

datasets:
  - immgen
  - daniel
  - tabula_sapiens
  - tabula_sapiens_100_cells_per_type
  - perturbation_kaggle
  - archs4_metasra

model_name_path_map:
  geneformer: resources/geneformer-12L-30M
  biogpt: microsoft/biogpt
  bert: dmis-lab/biobert-v1.1
  scgpt: resources/scGPT_human

# Only used, if not dedicated hyperparameter config file is provided
SWEEP_HYPERPARAMETERS:
  method: random
  name: test_sweep
  metric:
    goal: minimize
    name: val_loss
  parameters:
    batch_size:
      values: [2, 4]
    trainer.fast_dev_run:
      values: [true]
